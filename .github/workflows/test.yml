name: test

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "*.js"
      - "tsconfig.json"
      - "vitest.config.mts"
      - "test/**"
      - ".github/workflows/test.yml"
  push:
    branches:
      - "main"
    tags-ignore:
      - "**"
    paths:
      - "package.json"
      - "package-lock.json"
      - "*.js"
      - "tsconfig.json"
      - "vitest.config.mts"
      - "test/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install
        run: npm ci

      - name: build
        run: |
          npm run build

      - name: test
        run: |
          npm test
